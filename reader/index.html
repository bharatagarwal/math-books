<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathematics Reader</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="top-bar">
    <div>
      <span class="course-title" id="title"></span>
      <span class="course-meta" id="meta"></span>
    </div>
    <select class="course-select" id="bookSelect"></select>
  </div>

  <div class="wrap">
    <div class="sidebar" id="sidebar"></div>
    <div class="pane" id="pane" tabindex="-1"></div>
    <div class="outline" id="outline"></div>
  </div>

  <button class="mobile-zen-toggle" id="mobileZenToggle" type="button" aria-label="Toggle zen mode">Zen</button>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-footnote/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
