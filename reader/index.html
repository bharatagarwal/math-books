<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathematics Reader</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="top-bar">
    <div>
      <span class="course-title" id="title"></span>
      <span class="course-meta" id="meta"></span>
    </div>
    <select class="course-select" id="bookSelect"></select>
  </div>

  <div class="wrap">
    <div class="sidebar" id="sidebar"></div>
    <div class="pane" id="pane" tabindex="-1"></div>
    <div class="outline" id="outline"></div>
  </div>

  <div class="mobile-toolbar" id="mobileToolbar">
    <button class="mt-btn mt-toggle" id="mtToggle" type="button" aria-label="Expand toolbar">Aa</button>
    <div class="mt-tray" id="mtTray">
      <button class="mt-btn" id="mtFontDown" type="button" aria-label="Decrease font size">A&#x2212;</button>
      <button class="mt-btn" id="mtFontUp" type="button" aria-label="Increase font size">A+</button>
      <span class="mt-sep"></span>
      <button class="mt-btn mt-lh" id="mtLhDown" type="button" aria-label="Decrease line height">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/><polyline points="15,10 15,13" stroke-width="1.2"/><polyline points="14,12 15,13 16,12" stroke-width="1.2"/></svg>
      </button>
      <button class="mt-btn mt-lh" id="mtLhUp" type="button" aria-label="Increase line height">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="3" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/><polyline points="15,6 15,3" stroke-width="1.2"/><polyline points="14,4 15,3 16,4" stroke-width="1.2"/></svg>
      </button>
      <span class="mt-sep"></span>
      <button class="mt-btn" id="mobileZenToggle" type="button" aria-label="Toggle zen mode">Zen</button>
    </div>
  </div>
  <div class="mt-toast" id="mtToast"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-footnote/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
