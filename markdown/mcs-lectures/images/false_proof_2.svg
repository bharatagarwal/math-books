<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 350" width="450" height="350">
  <!-- Background -->
  <rect width="450" height="350" fill="white"/>

  <!-- Large rectangle (rearranged) -->
  <rect x="50" y="40" width="220" height="160" fill="#fff3e0" stroke="#333" stroke-width="2"/>

  <!-- Small rectangle (the cut piece) -->
  <rect x="50" y="200" width="40" height="45" fill="#e3f2fd" stroke="#333" stroke-width="2"/>

  <!-- Diagonal in large rectangle showing the "slide" -->
  <line x1="50" y1="200" x2="270" y2="40" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Dimension labels for large rectangle -->
  <!-- Width -->
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="12" fill="#333">11+</text>
  <line x1="50" y1="210" x2="270" y2="210" stroke="#666" stroke-width="1"/>

  <!-- Height segments -->
  <text x="285" y="90" font-family="system-ui" font-size="12" fill="#333">8</text>
  <line x1="275" y1="40" x2="275" y2="160" stroke="#666" stroke-width="1"/>

  <text x="285" y="180" font-family="system-ui" font-size="12" fill="#333">2</text>
  <line x1="275" y1="160" x2="275" y2="200" stroke="#666" stroke-width="1"/>

  <!-- Small rectangle dimensions -->
  <text x="70" y="260" text-anchor="middle" font-family="system-ui" font-size="12" fill="#333">2</text>
  <text x="25" y="225" font-family="system-ui" font-size="12" fill="#333">2+</text>

  <!-- The "cut" indicator -->
  <line x1="50" y1="160" x2="90" y2="200" stroke="#c62828" stroke-width="2"/>
  <text x="100" y="185" font-family="system-ui" font-size="11" fill="#c62828">cut here</text>

  <!-- Area calculations -->
  <text x="320" y="60" font-family="system-ui" font-size="12" fill="#333">Large rectangle:</text>
  <text x="320" y="80" font-family="system-ui" font-size="12" fill="#333">8 × 11+ > 88</text>

  <text x="320" y="120" font-family="system-ui" font-size="12" fill="#333">Small rectangle:</text>
  <text x="320" y="140" font-family="system-ui" font-size="12" fill="#333">2 × 2+ > 4</text>

  <text x="320" y="180" font-family="system-ui" font-size="14" font-weight="bold" fill="#333">Total > 92</text>

  <!-- The bug indicator -->
  <rect x="310" y="230" width="120" height="60" fill="#ffebee" stroke="#c62828" stroke-width="1" rx="4"/>
  <text x="370" y="252" text-anchor="middle" font-family="system-ui" font-size="11" fill="#c62828">THE BUG:</text>
  <text x="370" y="268" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c62828">Diagram not to scale!</text>
  <text x="370" y="282" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c62828">2+ is actually &lt; 2</text>

  <!-- Title -->
  <text x="225" y="320" text-anchor="middle" font-family="system-ui" font-size="13" fill="#666">Rearranged pieces — the proportions are wrong</text>
</svg>