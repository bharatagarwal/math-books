<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="320" fill="white"/>

  <!-- Rectangle outline -->
  <rect x="50" y="40" width="200" height="180" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Diagonal line creating two triangles -->
  <line x1="50" y1="220" x2="250" y2="40" stroke="#333" stroke-width="2"/>

  <!-- Fill triangles with different colors -->
  <polygon points="50,40 250,40 50,220" fill="#e3f2fd" stroke="#333" stroke-width="2"/>
  <polygon points="50,220 250,40 250,220" fill="#fff3e0" stroke="#333" stroke-width="2"/>

  <!-- Dimension labels -->
  <!-- Width label (10) -->
  <text x="150" y="250" text-anchor="middle" font-family="system-ui" font-size="14" fill="#333">10</text>
  <line x1="50" y1="235" x2="250" y2="235" stroke="#666" stroke-width="1"/>
  <line x1="50" y1="230" x2="50" y2="240" stroke="#666" stroke-width="1"/>
  <line x1="250" y1="230" x2="250" y2="240" stroke="#666" stroke-width="1"/>

  <!-- Height label (9) -->
  <text x="30" y="130" text-anchor="middle" font-family="system-ui" font-size="14" fill="#333">9</text>
  <line x1="35" y1="40" x2="35" y2="220" stroke="#666" stroke-width="1"/>
  <line x1="30" y1="40" x2="40" y2="40" stroke="#666" stroke-width="1"/>
  <line x1="30" y1="220" x2="40" y2="220" stroke="#666" stroke-width="1"/>

  <!-- Area calculations -->
  <text x="110" y="100" text-anchor="middle" font-family="system-ui" font-size="12" fill="#1565c0">Area = 45</text>
  <text x="190" y="170" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e65100">Area = 45</text>

  <!-- Total area label -->
  <text x="310" y="130" font-family="system-ui" font-size="14" fill="#333">Total Area:</text>
  <text x="310" y="150" font-family="system-ui" font-size="16" font-weight="bold" fill="#333">90</text>

  <!-- Title -->
  <text x="200" y="290" text-anchor="middle" font-family="system-ui" font-size="13" fill="#666">Two triangles forming a 9 × 10 rectangle</text>
</svg>