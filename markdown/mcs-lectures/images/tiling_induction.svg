<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="white"/>

  <!-- Main 2^(n+1) × 2^(n+1) grid -->
  <rect x="50" y="20" width="160" height="160" fill="#f5f5f5" stroke="#333" stroke-width="2"/>

  <!-- Quadrant divisions -->
  <line x1="130" y1="20" x2="130" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="50" y1="100" x2="210" y2="100" stroke="#333" stroke-width="1"/>

  <!-- The missing square (in bottom-right quadrant) -->
  <rect x="180" y="150" width="20" height="20" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
  <text x="190" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#c62828">Bill</text>

  <!-- L-tile at center -->
  <rect x="110" y="80" width="20" height="20" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="130" y="80" width="20" height="20" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="100" width="20" height="20" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>

  <!-- Quadrant labels -->
  <text x="90" y="65" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Q1</text>
  <text x="170" y="65" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Q2</text>
  <text x="90" y="145" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Q3</text>
  <text x="170" y="145" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Q4</text>

  <!-- Arrow showing recursive application -->
  <path d="M 230 100 L 260 100" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead2)"/>
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Result explanation -->
  <text x="280" y="40" font-family="system-ui" font-size="11" fill="#333">Each quadrant now has</text>
  <text x="280" y="56" font-family="system-ui" font-size="11" fill="#333">exactly one square missing:</text>

  <text x="290" y="85" font-family="system-ui" font-size="10" fill="#666">• Q1, Q2, Q3: from L-tile</text>
  <text x="290" y="102" font-family="system-ui" font-size="10" fill="#666">• Q4: original missing square</text>

  <text x="280" y="135" font-family="system-ui" font-size="11" fill="#333">Apply P(n) to each!</text>

  <!-- Dimension label -->
  <text x="130" y="205" text-anchor="middle" font-family="system-ui" font-size="11" fill="#333">2^(n+1) × 2^(n+1)</text>
</svg>
