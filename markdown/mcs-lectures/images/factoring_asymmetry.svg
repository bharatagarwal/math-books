<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" width="500" height="130">
  <rect width="500" height="130" fill="white"/>

  <!-- EASY direction (multiplication) -->
  <rect x="30" y="20" width="180" height="70" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="120" y="42" text-anchor="middle" font-family="system-ui" font-size="11" fill="#2e7d32" font-weight="bold">EASY: Multiplication</text>
  <text x="120" y="62" text-anchor="middle" font-family="monospace" font-size="12" fill="#333">p × q = N</text>
  <text x="120" y="80" text-anchor="middle" font-family="system-ui" font-size="10" fill="#666">milliseconds</text>

  <!-- Arrow -->
  <path d="M 220 55 L 280 55" stroke="#333" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- HARD direction (factoring) -->
  <rect x="290" y="20" width="180" height="70" fill="#ffebee" stroke="#c62828" stroke-width="2" rx="6"/>
  <text x="380" y="42" text-anchor="middle" font-family="system-ui" font-size="11" fill="#c62828" font-weight="bold">HARD: Factoring</text>
  <text x="380" y="62" text-anchor="middle" font-family="monospace" font-size="12" fill="#333">N → p, q</text>
  <text x="380" y="80" text-anchor="middle" font-family="system-ui" font-size="10" fill="#666">years / centuries</text>
</svg>
