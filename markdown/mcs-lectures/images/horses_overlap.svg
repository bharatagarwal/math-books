<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 130" width="450" height="130">
  <rect width="450" height="130" fill="white"/>

  <!-- Horse boxes -->
  <rect x="80" y="40" width="60" height="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="4"/>
  <text x="110" y="70" text-anchor="middle" font-family="system-ui" font-size="14" fill="#1565c0">h₁</text>

  <rect x="200" y="40" width="60" height="50" fill="#fff3e0" stroke="#e65100" stroke-width="2" rx="4"/>
  <text x="230" y="70" text-anchor="middle" font-family="system-ui" font-size="14" fill="#e65100">h₂</text>

  <!-- Set brackets -->
  <path d="M 70 35 L 70 25 L 150 25 L 150 35" fill="none" stroke="#1565c0" stroke-width="1.5"/>
  <text x="110" y="20" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1565c0">First n=1 horses</text>

  <path d="M 190 35 L 190 25 L 270 25 L 270 35" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <text x="230" y="20" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e65100">Last n=1 horses</text>

  <!-- The problem arrow -->
  <text x="160" y="70" text-anchor="middle" font-family="system-ui" font-size="20" fill="#c62828">?</text>

  <!-- Explanation box -->
  <rect x="290" y="30" width="140" height="70" fill="#ffebee" stroke="#c62828" stroke-width="1" rx="4"/>
  <text x="360" y="52" text-anchor="middle" font-family="system-ui" font-size="11" fill="#c62828" font-weight="bold">NO OVERLAP!</text>
  <text x="360" y="70" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c62828">Sets {h₁} and {h₂}</text>
  <text x="360" y="84" text-anchor="middle" font-family="system-ui" font-size="10" fill="#c62828">share no horses.</text>
</svg>
